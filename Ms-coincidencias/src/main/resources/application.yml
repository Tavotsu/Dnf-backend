server:
  port: 8083

spring:
  application:
    name: ms-coincidencias
  datasource:
    url: jdbc:postgresql://postgres-db:5432/dnf_db
    username: admin
    password: adminpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/