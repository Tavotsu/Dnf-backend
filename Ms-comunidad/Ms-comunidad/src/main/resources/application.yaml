server:
  port: 8094

spring:
  application:
    name: ms-comunidad
  datasource:
    url: jdbc:postgresql://localhost:5432/dnf_db
    username: admin
    password: adminpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    database-platform: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/