server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ms-pets-route
              uri: lb://ms-mascota
              predicates:
                - Path=/api/pets/**
              filters:
                - RewritePath=/api/pets/(?<segment>.*), /api/mascotas/$\{segment}

            - id: ms-auth-route
              uri: lb://ms-usuario
              predicates:
                - Path=/api/auth/**
              filters:
                - RewritePath=/api/auth/(?<segment>.*), /api/usuarios/$\{segment}

            - id: ruta-coincidencias
              uri: lb://ms-coincidencias
              predicates:
                - Path=/api/coincidencias/**
      mvc:
        routes:
          - id: ms-usuario
            uri: lb://MS-USUARIO
            predicates:
              - Path=/api/usuarios/**, /api/auth/**
          - id: ms-mascota
            uri: lb://MS-MASCOTA
            predicates:
              - Path=/api/pets/**
          - id: ms-coincidencias
            uri: lb://MS-COINCIDENCIAS
            predicates:
              - Path=/api/coincidencias/**
          - id: ms-comunidad
            uri: lb://MS-COMUNIDAD
            predicates:
              - Path=/api/success-stories/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/