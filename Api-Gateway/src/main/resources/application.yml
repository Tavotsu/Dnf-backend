server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      mvc:
        routes:

          - id: ruta-mascotas
            uri: lb://MS-MASCOTA
            predicates:
              - Path=/api/mascotas, /api/mascotas/**


          - id: ruta-usuarios
            uri: lb://MS-USUARIO
            predicates:
              - Path=/api/usuarios, /api/usuarios/**


          - id: ruta-coincidencias
            uri: lb://MS-COINCIDENCIAS
            predicates:
              - Path=/api/coincidencias, /api/coincidencias/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/