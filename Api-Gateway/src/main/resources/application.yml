server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ruta-mascotas
              uri: lb://ms-mascota
              predicates:
                - Path=/api/mascotas/**
              filters:
                - StripPrefix=2

            - id: ruta-usuarios
              uri: lb://ms-usuario
              predicates:
                - Path=/api/usuarios/**
              filters:
                - StripPrefix=2
            
            - id: ruta-coincidencias
              uri: lb://ms-coincidencias
              predicates:
                - Path=/api/coincidencias/**
              filters:
                - StripPrefix=2

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/