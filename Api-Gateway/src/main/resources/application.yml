server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: ms-pets-route
              uri: lb://ms-mascota
              predicates:
                - Path=/api/pets/**
              filters:
                - RewritePath=/api/pets/(?<segment>.*), /api/mascotas/$\{segment}

            - id: ms-auth-route
              uri: lb://ms-usuario
              predicates:
                - Path=/api/auth/**
              filters:
                - RewritePath=/api/auth/(?<segment>.*), /api/usuarios/$\{segment}

            - id: ruta-coincidencias
              uri: lb://ms-coincidencias
              predicates:
                - Path=/api/coincidencias/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/